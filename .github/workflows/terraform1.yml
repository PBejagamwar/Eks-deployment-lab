name: 'Terraform'

on:
  push:
    branches:
      - master
      - 'feature/**'   # Triggers on any feature branch
  pull_request:
    branches:
      - master          # PRs targeting master

jobs:
  terraform:
    name: 'Terraform'
    runs-on: ubuntu-latest
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_REGION: us-east-2

    defaults:
      run:
        shell: bash
        working-directory: .   # Set this to your Terraform directory if not root

    steps:
    - name: Checkout
      uses: actions/checkout@v3   # Upgraded from v2

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v2   # Upgraded from v1
      with:
        terraform_version: 1.14.0           # Pin a specific version for stability

    - name: Terraform Init
      run: terraform init -backend-config=backend.hcl

    - name: Terraform Format
      run: terraform fmt -check

    - name: Terraform Validate        # NEW: Validates config syntax & consistency
      run: terraform validate

    # Runs on ALL branches and PRs
    - name: Terraform Plan
      run: terraform plan -out=tfplan   # Save plan output for apply step

    # Upload plan artifact so apply can use the EXACT same plan
    - name: Upload Terraform Plan      # NEW: Ensures apply uses reviewed plan
      if: github.ref == 'refs/heads/master' && github.event_name == 'push'
      uses: actions/upload-artifact@v3
      with:
        name: tfplan
        path: tfplan

    # Runs ONLY on push to master
    - name: Terraform Apply
      if: github.ref == 'refs/heads/master' && github.event_name == 'push'
      #environment: production
      run: terraform apply -auto-approve tfplan   # Uses saved plan, not a fresh one
